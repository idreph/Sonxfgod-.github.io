<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONXFGOD – Concert Lubumbashi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Lato:wght@300;400&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #0d7a5f;
    --green-light: #1aaf86;
    --green-dark: #074d3c;
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --white: #f5f5f5;
    --black: #080808;
    --banner-h: 52px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Lato', sans-serif;
    overflow-x: hidden;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ══════════════════════════════
     FIXED TOP BANNER
  ══════════════════════════════ */
  #top-banner {
    position: fixed;
    top: 0; left: 50%; 
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    height: var(--banner-h);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    background: rgba(13, 90, 70, 0.90);
    border-bottom: 1px solid rgba(17,92,71,0.5);
  }

  .banner-text {
    font-family: 'Roboto', sans-serif;
    font-weight: 300;
    font-size: 0.78rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #ffffff;
    opacity: 0;
    animation: fadeDown 1s 0.3s forwards;
    white-space: nowrap;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══════════════════════════════
     HERO — plein écran, artiste centré
  ══════════════════════════════ */
  #hero {
    position: relative;
    width: 100%;
    /* hauteur fixe proche du screenshot */
    height: calc(100vw * 1.25);
    max-height: 600px;
    min-height: 380px;
    padding-top: var(--banner-h);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    overflow: hidden;
  }

  /* fond vert foncé comme dans le screenshot */
  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('BANCKGROUND.jpg');
    background-size: cover;
    background-position: center top;
    filter: brightness(0.55) saturate(1.3);
  }

  /* fallback couleur si image manquante */
  .hero-bg-color {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #1a5c47 0%, #0a2e22 55%, #050f09 100%);
    z-index: 0;
  }

  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0)    0%,
      rgba(0,0,0,0.1)  45%,
      rgba(0,0,0,0.75) 78%,
      rgba(0,0,0,1)    100%
    );
  }

  /* ── Artist block ── */
  .hero-text {
    position: relative;
    z-index: 5;
    text-align: center;
    width: 100%;
    padding: 0;
    /* colle le bas du bloc au bas du hero */
    margin-bottom: 0;
    padding-bottom: clamp(1.2rem, 4vw, 2rem);
    opacity: 0;
    animation: riseUp 1.1s 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  @keyframes riseUp {
    from { opacity: 0; transform: translateY(60px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* photo artiste : occupe toute la largeur du hero */
  .artist-img-wrap {
    width: 100%;
    margin: 0 auto -1.5rem; /* légère superposition avec le nom */
    line-height: 0;
  }

  .artist-img-wrap img {
    width: 100%;
    display: block;
    mix-blend-mode: lighten;
    filter: drop-shadow(0 0 40px rgba(26,175,134,0.35));
    object-fit: cover;
    object-position: top center;
    /* clamp hauteur pour que la photo ne soit pas trop haute */
    max-height: calc(100vw * 0.9);
  }

  .artist-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.6rem, 18vw, 6.5rem);
    line-height: 0.9;
    letter-spacing: 0.03em;
    background: linear-gradient(180deg, #ffffff 0%, #d0d0d0 55%, #999 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(26,175,134,0.3));
    margin-top: 0;
    display: block;
  }

  .en-concert {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: clamp(0.85rem, 3.8vw, 1.4rem);
    letter-spacing: clamp(0.2em, 1.5vw, 0.42em);
    text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 0 16px rgba(201,168,76,0.45);
    margin-top: 0.25rem;
    display: block;
    line-height: 1.5;
  }

  /* ══════════════════════════════
     INFO SECTION
  ══════════════════════════════ */
  #info {
    position: relative;
    z-index: 10;
    background: var(--black);
    padding: clamp(1.8rem, 5vw, 3rem) clamp(1rem, 4vw, 1.5rem) 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .divider {
    width: 85%;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: clamp(1.2rem, 4vw, 2rem);
    opacity: 0;
    animation: fadeIn 1s 1.4s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* date */
  .date-block {
    text-align: center;
    margin-bottom: clamp(1.5rem, 4.5vw, 2.5rem);
    opacity: 0;
    animation: fadeIn 1s 1.6s forwards;
  }

  .date-block .day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 18vw, 7rem);
    line-height: 0.85;
    color: var(--white);
    letter-spacing: 0.02em;
  }

  .date-block .day span.juin { color: var(--green-light); }

  .date-block .time {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: clamp(0.8rem, 3vw, 1.1rem);
    letter-spacing: 0.35em;
    color: var(--gold);
    margin-top: 0.4rem;
    text-transform: uppercase;
  }

  /* tickets */
  #tickets {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(0.5rem, 2vw, 0.9rem);
    margin-bottom: clamp(1.2rem, 4vw, 2rem);
    opacity: 0;
    animation: fadeIn 1s 1.9s forwards;
  }

  .ticket-card {
    border: 1px solid;
    padding: clamp(0.9rem, 3.5vw, 1.4rem) clamp(0.5rem, 2vw, 1rem);
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
    cursor: default;
    border-radius: 3px;
  }

  .ticket-card:hover { transform: translateY(-4px); }

  .ticket-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.07;
    transition: opacity 0.3s;
  }
  .ticket-card:hover::before { opacity: 0.14; }

  .ticket-card.standard { border-color: rgba(26,175,134,0.5); }
  .ticket-card.standard::before { background: var(--green-light); }
  .ticket-card.vip { border-color: var(--gold); }
  .ticket-card.vip::before { background: var(--gold); }

  .ticket-card .label {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 0.18em;
    font-size: clamp(0.6rem, 2.2vw, 0.82rem);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .ticket-card.standard .label { color: var(--green-light); }
  .ticket-card.vip .label { color: var(--gold); }

  .ticket-card .price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 9vw, 3.2rem);
    line-height: 1;
    color: var(--white);
  }

  .ticket-card .currency {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: clamp(0.72rem, 2.2vw, 0.9rem);
    color: rgba(255,255,255,0.55);
    margin-top: 0.2rem;
  }

  /* venue */
  #venue {
    width: 100%;
    background: rgba(13,122,95,0.10);
    border: 1px solid rgba(26,175,134,0.22);
    padding: clamp(1rem, 3.5vw, 1.8rem) clamp(0.8rem, 3.5vw, 1.4rem);
    margin-bottom: clamp(1.2rem, 4vw, 2rem);
    text-align: center;
    opacity: 0;
    animation: fadeIn 1s 2.1s forwards;
    border-radius: 3px;
  }

  .venue-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 7vw, 2.8rem);
    letter-spacing: 0.08em;
    color: var(--white);
    margin-bottom: 0.4rem;
  }

  .venue-detail {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: clamp(0.65rem, 2.2vw, 0.85rem);
    color: rgba(255,255,255,0.5);
    line-height: 1.9;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .venue-detail strong {
    color: var(--green-light);
    font-weight: 400;
  }

  /* infoline */
  #infoline {
    margin-bottom: clamp(2rem, 6vw, 3.5rem);
    opacity: 0;
    animation: fadeIn 1s 2.3s forwards;
    text-align: center;
  }

  .infoline-label {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: 0.68rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
    margin-bottom: 0.3rem;
  }

  .infoline-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.4rem, 6vw, 2rem);
    letter-spacing: 0.14em;
    color: var(--gold);
  }

  /* bottom bar */
  .bottom-bar {
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, var(--green-dark), var(--gold), var(--green-dark));
  }

  /* ══════════════════════════════
     PARTICLES
  ══════════════════════════════ */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--gold-light);
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 0.45; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
  }
</style>
</head>
<body>

<!-- FIXED BANNER -->
<header id="top-banner">
  <span class="banner-text">VN Évent Présente</span>
</header>

<!-- floating particles -->
<div class="particles" id="particles"></div>

<!-- HERO -->
<section id="hero">
  <div class="hero-bg-color"></div>
  <div class="hero-bg"></div>
  <div class="hero-text">
    <div class="artist-img-wrap">
      <img src="SONXFGOD.png" alt="SONXFGOD">
    </div>
    <div class="artist-name">SONXFGOD</div>
    <span class="en-concert">En Concert</span>
    <span class="en-concert">à Lubumbashi</span>
  </div>
</section>

<!-- INFO -->
<section id="info">
  <div class="divider"></div>

  <div class="date-block">
    <div class="day">14 <span class="juin">Juin</span></div>
    <div class="time">⏱ 15 h 00</div>
  </div>

  <div id="tickets">
    <div class="ticket-card standard">
      <div class="label">Standard</div>
      <div class="price">10<sup style="font-size:1rem">$</sup></div>
      <div class="currency">USD</div>
    </div>
    <div class="ticket-card vip">
      <div class="label">VIP</div>
      <div class="price">20<sup style="font-size:1rem">$</sup></div>
      <div class="currency">USD</div>
    </div>
  </div>

  <div id="venue">
    <div class="venue-name">Salle Elika</div>
    <div class="venue-detail">
      <strong>Golf Lido</strong><br>
      24, Av. Lubembe — Lubumbashi<br>
      Réf : Ancienne Résidence Kazembe
    </div>
  </div>

  <div id="infoline">
    <div class="infoline-label">Infoline</div>
    <a href="https://wa.me/243974463199" class="infoline-number" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">+243 974 463 199</a>
  </div>

  <div class="bottom-bar"></div>
</section>

<script>
  // ── Scroll-blur banner ──
  const banner = document.getElementById('top-banner');
  window.addEventListener('scroll', () => {
    banner.classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });

  // ── Particles ──
  const container = document.getElementById('particles');
  const count = window.innerWidth < 480 ? 14 : 24;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    const size = (1 + Math.random() * 2.5) + 'px';
    p.style.width = size;
    p.style.height = size;
    container.appendChild(p);
  }
</script>
</body>
</html>
